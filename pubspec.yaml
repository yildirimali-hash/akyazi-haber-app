name: akyazi_haber_app
description: Akyazı Haber Mobil Uygulaması
publish_to: 'none'
version: 1.2.0+14

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # HTTP istekleri için
  http: ^1.1.0

  # State management
  provider: ^6.1.1
  
  # Resim cache
  cached_network_image: ^3.3.0
  flutter_cache_manager: ^3.3.1
  
  # URL açma
  url_launcher: ^6.2.1
  
  # Tarih formatı
  intl: ^0.18.1
  
  # Share
  share_plus: ^10.0.0
  
  # Icons
  cupertino_icons: ^1.0.2

  html_unescape: ^2.0.0
  

  firebase_core: ^3.6.0           # ← Güncelle
  firebase_messaging: ^15.1.3     # ← Güncelle
  flutter_local_notifications: ^17.2.3
  firebase_analytics: ^11.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1  



flutter:
  uses-material-design: true
  
  assets:
    - assets/images/


flutter_icons:
  android: true
  ios: true
  image_path: "android/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png"
  remove_alpha_ios: true
